global(
  workDirectory="/var/spool/rsyslog"
)

module(load="imudp")

template(
  name="RemoteLogPath"
  type="string"
  string="/var/log/remote/%HOSTNAME%/%$year%-%$month%-%$day%.log"
)

template(
  name="RemoteLogLine"
  type="string"
  string="%timereported:::date-rfc3339% %HOSTNAME% %syslogtag%%msg%\n"
)

ruleset(name="remote_udp") {
  action(
    type="omfile"
    dynaFile="RemoteLogPath"
    template="RemoteLogLine"
    createDirs="on"
    dirCreateMode="0755"
    fileCreateMode="0644"
  )
}

input(type="imudp" port="514" ruleset="remote_udp")
